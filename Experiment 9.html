<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: lightblue;   /* single color */
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid gray;
        }

        h2 {
            text-align: center;
            color: darkblue;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: black;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid gray;
        }

        .skills input {
            width: auto;
            margin-right: 5px;
        }

        .skills {
            margin-bottom: 15px;
        }

        .btn {
            display: flex;
            justify-content: space-between;
        }

        input[type="submit"] {
            width: 48%;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="reset"] {
            width: 48%;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="container">

<h2>Employee Registration</h2>

<form action="success.html">

    <label>Full Name</label>
    <input type="text" required>

    <label>Email</label>
    <input type="email" required>

    <label>Password</label>
    <input type="password" required>

    <label>Gender</label><br>
    <input type="radio" name="g"> Male
    <input type="radio" name="g"> Female
    <br><br>

    <label>Skills</label>
    <div class="skills">
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript
        <input type="checkbox"> Java
    </div>

    <label>Department</label>
    <select>
        <option>IT</option>
        <option>HR</option>
        <option>Finance</option>
    </select>

    <label>Address</label>
    <textarea rows="3"></textarea>

    <div class="btn">
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </div>

</form>

</div>

</body>
</html>
